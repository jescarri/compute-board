name: PR cleanup

on:
  pull_request:
    types: [closed]

concurrency:
  group: gh-pages-push
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prune:
    name: Remove PR preview from gh-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source (for scripts)
        uses: actions/checkout@v4
        with:
          path: src

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: site
        continue-on-error: true

      - name: Prune PR directory
        if: hashFiles('site/.git/HEAD') != ''
        run: bash src/.github/scripts/prune-pr.sh site ${{ github.event.number }}

      - name: Regenerate landing index
        if: hashFiles('site/.git/HEAD') != ''
        run: bash src/.github/scripts/regen-landing.sh site

      - name: Commit and push
        if: hashFiles('site/.git/HEAD') != ''
        working-directory: site
        run: |
          if git diff --quiet && [ -z "$(git status --porcelain)" ]; then
            echo "Nothing to prune"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "ci: remove preview for PR #${{ github.event.number }}"
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "Push attempt ${attempt} failed, rebasing and retrying"
            git pull --rebase origin gh-pages
          done
          echo "::error::Failed to push cleanup commit after 3 attempts"
          exit 1
